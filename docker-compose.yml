services:
  backend:
    build: .
    container_name: sparetrack_backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./uploads:/app/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build: .
    container_name: sparetrack_celery_worker
    restart: always
    env_file:
      - .env
    depends_on:
      - backend
      - postgres
      - redis
    volumes:
      - ./uploads:/app/uploads
    command: celery -A app.celery_app.celery worker --loglevel=info

  postgres:
    image: postgres:16
    container_name: sparetrack_postgres
    restart: always
    environment:
      POSTGRES_DB: sparetrack_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - sparetrack_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: sparetrack_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  sparetrack_postgres_data: