name: Deploy SpareTrack Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/sparetrack_key
          chmod 600 ~/.ssh/sparetrack_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on VPS
        run: |
          ssh -i ~/.ssh/sparetrack_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
            set -e

            PROJECT_PATH="${{ secrets.VPS_PROJECT_PATH }}"

            echo "Project path: $PROJECT_PATH"

            if [ ! -d "$PROJECT_PATH" ]; then
              echo "Project folder does not exist: $PROJECT_PATH"
              echo "Available folders in /var/www:"
              ls -la /var/www
              exit 1
            fi

            cd "$PROJECT_PATH"

            echo "Current folder:"
            pwd

            echo "Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            echo "Building Docker containers..."
            docker compose up --build -d

            echo "Running database migrations..."
            docker compose exec -T backend alembic upgrade head

            echo "Restarting backend and celery worker..."
            docker compose restart backend celery_worker

            echo "Cleaning unused Docker images..."
            docker image prune -f

            echo "Containers:"
            docker compose ps

            echo "Deployment completed successfully."
          EOF